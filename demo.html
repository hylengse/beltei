<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Box</title>
    <style>
      .container div {
        background-color: aqua;
        width: 150px;
        padding: 10px;
        margin: 10px;
        font-size: 20px;
        text-align: center;
      }
      .container {
        display: flex;
        height: 300px;
        flex-wrap: wrap;
        overflow: auto;
        align-content: flex-start;
        background-color: antiquewhite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="order: 4; flex-grow: 1">Items 1</div>
      <div style="order: 2; flex-grow: 1">Items 2</div>
      <div style="order: 3; flex-grow: 1">Items 3</div>
      <div style="order: 1; flex-grow: 4">Items 4</div>
    </div>
  </body>
</html>
