<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 200px;
        height: 200px;
        text-align: center;
        box-shadow: 10px 10px 20px rgb(206, 182, 3);
      }
      .div1 {
        background-color: aqua;
        float: left;
      }
      .div2 {
        background-color: blueviolet;
        float: right;
      }
      p {
        text-shadow: 2px 2px 5px yellow;
      }
    </style>
  </head>
  <body>
    <div class="div1"><p>One</p></div>
    <div class="div2">Two</div>
  </body>
</html>
